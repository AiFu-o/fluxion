<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxion Playground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        #app {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #4fc3f7;
            margin-bottom: 30px;
            text-align: center;
        }

        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            color: #81d4fa;
            margin-bottom: 16px;
            font-size: 18px;
        }

        .counter {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: #4fc3f7;
        }

        .btn {
            background: #4fc3f7;
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 4px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #29b6f6;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-danger {
            background: #ef5350;
        }

        .btn-danger:hover {
            background: #f44336;
        }

        .btn-success {
            background: #66bb6a;
        }

        .btn-success:hover {
            background: #4caf50;
        }

        .todos {
            list-style: none;
        }

        .todos li {
            padding: 12px;
            border-bottom: 1px solid #0d47a1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .todos li.completed {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .todos input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .todos input[type="text"] {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #0d47a1;
            border-radius: 6px;
            background: #0d47a1;
            color: #fff;
            font-size: 14px;
        }

        .todos input[type="text"]:focus {
            outline: none;
            border-color: #4fc3f7;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #81d4fa;
        }

        .error {
            color: #ef5350;
            padding: 12px;
            background: rgba(239, 83, 80, 0.1);
            border-radius: 8px;
            margin-top: 12px;
        }

        .info {
            color: #81d4fa;
            padding: 12px;
            background: rgba(129, 212, 250, 0.1);
            border-radius: 8px;
            margin-top: 12px;
        }

        .computed-value {
            font-size: 24px;
            color: #ffcc80;
            text-align: center;
            margin: 16px 0;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>⚡ Fluxion Playground</h1>

        <!-- Signal 示例 -->
        <div class="card">
            <h2>Signal 示例</h2>
            <div class="counter" id="counter">0</div>
            <div style="text-align: center;">
                <button class="btn" id="increment">+1</button>
                <button class="btn btn-danger" id="reset">重置</button>
            </div>
        </div>

        <!-- Computed 示例 -->
        <div class="card">
            <h2>Computed 示例</h2>
            <p>Count: <span id="count-value">0</span></p>
            <p>Double: <span id="double-value">0</span></p>
            <p>Triple: <span id="triple-value">0</span></p>
            <div style="text-align: center; margin-top: 16px;">
                <button class="btn" id="inc-computed">+1</button>
            </div>
        </div>

        <!-- Reactive 示例 -->
        <div class="card">
            <h2>Reactive 示例</h2>
            <div id="reactive-display"></div>
            <div style="text-align: center; margin-top: 16px;">
                <button class="btn btn-success" id="update-reactive">更新数据</button>
            </div>
        </div>

        <!-- 简单的 TODO 示例 -->
        <div class="card">
            <h2>TODO 示例</h2>
            <ul class="todos" id="todo-list"></ul>
            <div style="margin-top: 16px;">
                <input type="text" id="todo-input" placeholder="添加新任务...">
                <button class="btn" id="add-todo">添加</button>
            </div>
        </div>

        <!-- Effect 示例 -->
        <div class="card">
            <h2>Effect 示例</h2>
            <div id="effect-log" class="info"></div>
            <div style="text-align: center; margin-top: 16px;">
                <button class="btn" id="trigger-effect">触发 Effect</button>
            </div>
        </div>

        <!-- VNode 示例 -->
        <div class="card">
            <h2>VNode 示例 (runtime-core)</h2>
            <div id="vnode-display" class="info" style="font-family: monospace; white-space: pre-wrap;"></div>
            <div style="text-align: center; margin-top: 16px;">
                <button class="btn" id="create-vnode">创建 VNode</button>
                <button class="btn btn-success" id="create-h">使用 h() 函数</button>
            </div>
        </div>

        <!-- 调度器示例 -->
        <div class="card">
            <h2>调度器示例 (Scheduler)</h2>
            <div id="scheduler-log" class="info" style="font-family: monospace; white-space: pre-wrap;"></div>
            <div style="text-align: center; margin-top: 16px;">
                <button class="btn" id="queue-jobs">队列任务</button>
                <button class="btn btn-danger" id="clear-queue">清空队列</button>
            </div>
        </div>

        <!-- Style 示例 (patchStyle) -->
        <div class="card">
            <h2>Style 示例 (patchStyle)</h2>
            <div id="style-demo-container" style="min-height: 80px;">
                <div id="style-demo-box" style="padding: 16px; background: #2a4a7f; border-radius: 8px; text-align: center; transition: all 0.3s;">
                    样式演示区域
                </div>
            </div>
            <div style="text-align: center; margin-top: 16px;">
                <button class="btn" id="style-string">字符串样式</button>
                <button class="btn btn-success" id="style-object">对象样式</button>
                <button class="btn" id="style-update">更新样式</button>
                <button class="btn btn-danger" id="style-clear">清空样式</button>
            </div>
            <div id="style-log" class="info" style="margin-top: 12px; font-family: monospace; font-size: 12px;"></div>
        </div>

        <!-- createApp 示例 -->
        <div class="card">
            <h2>createApp 示例</h2>
            <div id="app-display" class="info" style="min-height: 80px;">
                <p style="color: #81d4fa;">点击 "挂载应用" 创建并挂载 Fluxion 应用</p>
            </div>
            <div style="text-align: center; margin-top: 16px;">
                <button class="btn btn-success" id="mount-app">挂载应用</button>
                <button class="btn btn-danger" id="unmount-app">卸载应用</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
