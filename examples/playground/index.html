<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxion Playground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        #app {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #4fc3f7;
            margin-bottom: 30px;
            text-align: center;
        }

        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            color: #81d4fa;
            margin-bottom: 16px;
            font-size: 18px;
        }

        .counter {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: #4fc3f7;
        }

        .btn {
            background: #4fc3f7;
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 4px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #29b6f6;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-danger {
            background: #ef5350;
        }

        .btn-danger:hover {
            background: #f44336;
        }

        .btn-success {
            background: #66bb6a;
        }

        .btn-success:hover {
            background: #4caf50;
        }

        .todos {
            list-style: none;
        }

        .todos li {
            padding: 12px;
            border-bottom: 1px solid #0d47a1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .todos li.completed {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .todos input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .todos input[type="text"] {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #0d47a1;
            border-radius: 6px;
            background: #0d47a1;
            color: #fff;
            font-size: 14px;
        }

        .todos input[type="text"]:focus {
            outline: none;
            border-color: #4fc3f7;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #81d4fa;
        }

        .error {
            color: #ef5350;
            padding: 12px;
            background: rgba(239, 83, 80, 0.1);
            border-radius: 8px;
            margin-top: 12px;
        }

        .info {
            color: #81d4fa;
            padding: 12px;
            background: rgba(129, 212, 250, 0.1);
            border-radius: 8px;
            margin-top: 12px;
        }

        .computed-value {
            font-size: 24px;
            color: #ffcc80;
            text-align: center;
            margin: 16px 0;
        }
    </style>
</head>
<body>
    <div id="app">
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
